name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      # Gate: Keine Alt-Domain-Links in App-Code (Launch-Plan M1/B1).
      # data/produkte.ts (tdsUrl/websiteUrl) und lib/kontaktDaten.ts
      # (Impressum/Datenschutz) folgen in M2/M3 und sind bewusst ausgenommen.
      - name: Check alt-domain links
        run: bash scripts/check-alt-domain.sh

      - run: npx tsx scripts/validate-referenzen.ts

      - run: npx tsx scripts/test-loesungsfinder.ts

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /KORODUR-Website
          # Canonical/hreflang/Sitemap zeigen auf die aktuelle Pages-Origin;
          # der Cutover-Build setzt stattdessen https://www.korodur.de.
          NEXT_PUBLIC_SITE_URL: https://sfleischmann-3steps2.github.io
          # Cloudflare Web Analytics (cookieless). Leer = deaktiviert.
          # Aktivierung: Repo-Variable CF_BEACON_TOKEN setzen (Token aus dem
          # Cloudflare-Dashboard, Web Analytics > Site hinzufügen).
          NEXT_PUBLIC_CF_BEACON_TOKEN: ${{ vars.CF_BEACON_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
